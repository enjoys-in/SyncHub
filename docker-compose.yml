services:
  ws-elixir:
    build:
      context: ./ws-elixir
      dockerfile: Dockerfile
      network: host
    ports:
      - "4000:4000"
    environment:
      - MIX_ENV=dev
      - PORT=4000
    volumes:
      - ./ws-elixir/data:/app/data
    restart: unless-stopped

  ws-go:
    build:
      context: ./ws-go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    volumes:
      - ./ws-go/data:/app/data
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
