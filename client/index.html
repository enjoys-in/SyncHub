<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ WebSocket Broker — Test Console</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a12;--surface:#12121f;--surface2:#1a1a2e;--border:#252540;--accent:#7c6aff;--accent2:#00e5b0;--text:#e8e8f0;--dim:#6b6b8d;--red:#ff4d6a;--green:#36d986;--yellow:#ffd166;--radius:10px}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
  h1{text-align:center;font-size:1.4rem;margin-bottom:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
  .grid{display:grid;grid-template-columns:320px 1fr;gap:16px;max-width:1400px;margin:0 auto;height:calc(100vh - 80px)}
  .sidebar{display:flex;flex-direction:column;gap:12px;overflow-y:auto}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
  .card h3{font-size:.85rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;font-weight:600}
  label{font-size:.75rem;color:var(--dim);display:block;margin-bottom:4px;margin-top:8px}
  label:first-child{margin-top:0}
  input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:.82rem;font-family:'Inter',sans-serif}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{font-family:'JetBrains Mono',monospace;font-size:.78rem;min-height:50px;resize:vertical}
  .row{display:flex;gap:6px;align-items:flex-end}
  .row > *{flex:1}
  button{padding:7px 14px;border:none;border-radius:6px;font-size:.8rem;cursor:pointer;font-weight:600;transition:all .15s;font-family:'Inter',sans-serif}
  button:hover{filter:brightness(1.1)}
  button:disabled{opacity:.35;cursor:not-allowed}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-success{background:var(--green);color:#000}
  .btn-danger{background:var(--red);color:#fff}
  .btn-warn{background:var(--yellow);color:#000}
  .btn-ghost{background:var(--border);color:var(--text)}
  .btn-full{width:100%;margin-top:8px}
  .main{display:flex;flex-direction:column;gap:12px}
  .tabs{display:flex;gap:4px}
  .tab{padding:6px 16px;background:var(--surface);border:1px solid var(--border);border-bottom:none;border-radius:6px 6px 0 0;font-size:.8rem;cursor:pointer;color:var(--dim)}
  .tab.active{background:var(--surface2);color:var(--accent);border-color:var(--accent)}
  .log-panel{background:var(--surface);border:1px solid var(--border);border-radius:0 var(--radius) var(--radius) var(--radius);flex:1;overflow-y:auto;padding:10px;font-family:'JetBrains Mono',monospace;font-size:.75rem;line-height:1.7;min-height:300px}
  .entry{padding:2px 0;border-bottom:1px solid var(--border);word-break:break-all}
  .entry.sent{color:var(--accent)}
  .entry.recv{color:var(--accent2)}
  .entry.sys{color:var(--dim);font-style:italic}
  .entry.err{color:var(--red)}
  .entry.sse{color:var(--yellow)}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;transition:background .3s}
  .dot.off{background:var(--red)}.dot.on{background:var(--green)}
  .status-bar{display:flex;gap:16px;align-items:center;font-size:.75rem;color:var(--dim);padding:6px 0}
  .key-display{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-family:'JetBrains Mono',monospace;font-size:.72rem;word-break:break-all;margin-top:6px;color:var(--accent)}
  @media(max-width:900px){.grid{grid-template-columns:1fr;height:auto}}
</style>
</head>
<body>
<h1>⚡ WebSocket Message Broker — Console</h1>

<div class="grid">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <!-- API Key -->
    <div class="card">
      <h3>🔑 API Key</h3>
      <label>Name</label>
      <input id="key-name" value="My App" placeholder="App name">
      <label>Allowed Domains</label>
      <input id="key-domains" value="*" placeholder="*.example.com, localhost">
      <button class="btn-primary btn-full" onclick="createKey()">Generate API Key</button>
      <div id="key-display" class="key-display" style="display:none"></div>
      <label>Active Key</label>
      <input id="api-key" placeholder="Paste API key here">
    </div>

    <!-- Connect -->
    <div class="card">
      <h3><span class="dot off" id="ws-dot"></span> WebSocket</h3>
      <label>Server URL</label>
      <select id="ws-url" onchange="updateBaseUrl()">
        <option value="http://localhost:8080">Go Server (:8080)</option>
        <option value="http://localhost:4000">Elixir Server (:4000)</option>
      </select>
      <div class="row">
        <div><label>Channel</label><input id="ws-channel" value="my-channel"></div>
        <div><label>Client ID</label><input id="ws-client" value="user1"></div>
      </div>
      <div class="row" style="margin-top:8px">
        <button class="btn-success" id="btn-ws-connect" onclick="wsConnect()">Connect</button>
        <button class="btn-danger" id="btn-ws-disconnect" onclick="wsDisconnect()" disabled>Disconnect</button>
      </div>
    </div>

    <!-- SSE -->
    <div class="card">
      <h3><span class="dot off" id="sse-dot"></span> SSE Subscribe</h3>
      <label>Channel</label>
      <input id="sse-channel" value="my-channel">
      <div class="row" style="margin-top:8px">
        <button class="btn-warn" id="btn-sse-connect" onclick="sseConnect()">Subscribe</button>
        <button class="btn-danger" id="btn-sse-disconnect" onclick="sseDisconnect()" disabled>Stop</button>
      </div>
    </div>

    <!-- Publish -->
    <div class="card">
      <h3>📤 Publish (HTTP POST)</h3>
      <label>Channel</label>
      <input id="pub-channel" value="my-channel">
      <label>Event</label>
      <input id="pub-event" value="message">
      <label>Publisher</label>
      <input id="pub-publisher" placeholder="Your name (optional)">
      <label>Data (JSON)</label>
      <textarea id="pub-data">{"text": "Hello from HTTP!", "user": "admin"}</textarea>
      <button class="btn-primary btn-full" onclick="publishHTTP()">Publish via POST</button>
    </div>

    <!-- WS Send -->
    <div class="card">
      <h3>📨 Send via WebSocket</h3>
      <label>Type</label>
      <select id="msg-type">
        <option value="room_message">room_message</option>
        <option value="broadcast">broadcast</option>
        <option value="direct">direct (1:1)</option>
        <option value="user_info">user_info</option>
        <option value="join_room">join_room</option>
        <option value="leave_room">leave_room</option>
        <option value="ping">ping</option>
      </select>
      <div class="row">
        <div><label>Room</label><input id="msg-room" value="my-channel"></div>
        <div><label>Target ID</label><input id="msg-target" placeholder="for direct"></div>
      </div>
      <label>Payload (JSON)</label>
      <textarea id="msg-payload">{"text": "Hello via WS!"}</textarea>
      <button class="btn-primary btn-full" onclick="wsSend()">Send</button>
    </div>
  </div>

  <!-- MAIN LOG AREA -->
  <div class="main">
    <div class="status-bar">
      <span>WS: <strong id="ws-status">Disconnected</strong></span>
      <span>SSE: <strong id="sse-status">Disconnected</strong></span>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('all')">All</div>
      <div class="tab" onclick="switchTab('ws')">WebSocket</div>
      <div class="tab" onclick="switchTab('sse')">SSE</div>
      <div class="tab" onclick="switchTab('http')">HTTP</div>
    </div>
    <div class="log-panel" id="log"></div>
    <button class="btn-ghost" onclick="clearLog()" style="align-self:flex-end">Clear Log</button>
  </div>
</div>

<script>
let ws = null, sse = null, activeTab = 'all';
let BASE = 'http://localhost:8080';

function updateBaseUrl() {
  BASE = document.getElementById('ws-url').value;
  addLog('sys', `Switched to ${BASE}`, 'sys');
}

// ─── API Key ──────────────────────────────────────────────
async function createKey() {
  const name = document.getElementById('key-name').value;
  const domains = document.getElementById('key-domains').value.split(',').map(d => d.trim());
  try {
    const res = await fetch(`${BASE}/api/keys`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, domains })
    });
    const data = await res.json();
    if (data.key) {
      document.getElementById('key-display').style.display = 'block';
      document.getElementById('key-display').textContent = data.key;
      document.getElementById('api-key').value = data.key;
      addLog('http', `API Key created: ${data.key.slice(0, 12)}...`, 'sys');
    } else {
      addLog('http', `Error: ${JSON.stringify(data)}`, 'err');
    }
  } catch (e) { addLog('http', `Fetch error: ${e.message}`, 'err'); }
}

// ─── WebSocket ────────────────────────────────────────────
function wsConnect() {
  const wsBase = BASE.replace('http', 'ws');
  const key = document.getElementById('api-key').value;
  const channel = document.getElementById('ws-channel').value;
  const clientId = document.getElementById('ws-client').value;
  if (!key) { addLog('ws', 'API key required — generate one first', 'err'); return; }
  const wsUrl = `${wsBase}/ws?api_key=${key}&channel=${encodeURIComponent(channel)}&client_id=${encodeURIComponent(clientId)}`;
  ws = new WebSocket(wsUrl);
  addLog('ws', 'Connecting...', 'sys');
  ws.onopen = () => { addLog('ws', 'Connected ✓', 'sys'); setWSState(true); };
  ws.onclose = (e) => { addLog('ws', `Disconnected (${e.code})`, 'sys'); setWSState(false); };
  ws.onerror = () => { addLog('ws', 'Connection error', 'err'); };
  ws.onmessage = (e) => {
    e.data.split('\n').forEach(line => {
      if (line.trim()) {
        addLog('ws', '← ' + line, 'recv');
        showNotification(line);
      }
    });
  };
}
function wsDisconnect() { if (ws) ws.close(); }

function wsSend() {
  if (!ws || ws.readyState !== 1) { addLog('ws', 'Not connected', 'err'); return; }
  const type = document.getElementById('msg-type').value;
  let payload;
  try { payload = JSON.parse(document.getElementById('msg-payload').value || '{}'); } catch { payload = document.getElementById('msg-payload').value; }
  const msg = {
    type, payload,
    id: crypto.randomUUID().slice(0, 8),
    room: document.getElementById('msg-room').value || undefined,
    target_id: document.getElementById('msg-target').value || undefined,
    timestamp: Date.now()
  };
  ws.send(JSON.stringify(msg));
  addLog('ws', '→ ' + JSON.stringify(msg), 'sent');
}

function setWSState(on) {
  document.getElementById('ws-dot').className = 'dot ' + (on ? 'on' : 'off');
  document.getElementById('btn-ws-connect').disabled = on;
  document.getElementById('btn-ws-disconnect').disabled = !on;
  document.getElementById('ws-status').textContent = on ? 'Connected' : 'Disconnected';
}

// ─── SSE ──────────────────────────────────────────────────
function sseConnect() {
  const key = document.getElementById('api-key').value;
  const channel = document.getElementById('sse-channel').value;
  if (!key) { addLog('sse', 'API key required', 'err'); return; }
  const url = `${BASE}/subscribe?channel=${encodeURIComponent(channel)}&api_key=${key}`;
  sse = new EventSource(url);
  addLog('sse', 'Subscribing...', 'sys');

  sse.addEventListener('connected', (e) => {
    addLog('sse', 'Connected ✓ ' + e.data, 'sys');
    setSSEState(true);
  });
  sse.addEventListener('message', (e) => {
    addLog('sse', '← ' + e.data, 'sse');
    showNotification(e.data);
  });
  sse.onerror = () => {
    addLog('sse', 'Connection error/closed', 'err');
    setSSEState(false);
  };
}
function sseDisconnect() { if (sse) { sse.close(); setSSEState(false); addLog('sse', 'Disconnected', 'sys'); } }

function setSSEState(on) {
  document.getElementById('sse-dot').className = 'dot ' + (on ? 'on' : 'off');
  document.getElementById('btn-sse-connect').disabled = on;
  document.getElementById('btn-sse-disconnect').disabled = !on;
  document.getElementById('sse-status').textContent = on ? 'Connected' : 'Disconnected';
}

// ─── HTTP Publish ─────────────────────────────────────────
async function publishHTTP() {
  const key = document.getElementById('api-key').value;
  const channel = document.getElementById('pub-channel').value;
  const event = document.getElementById('pub-event').value;
  const publisher = document.getElementById('pub-publisher').value;
  let data;
  try { data = JSON.parse(document.getElementById('pub-data').value); } catch { data = document.getElementById('pub-data').value; }

  if (!key) { addLog('http', 'API key required', 'err'); return; }
  try {
    const res = await fetch(`${BASE}/publish`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': key },
      body: JSON.stringify({ channel, event, data, publisher: publisher || undefined })
    });
    const result = await res.json();
    addLog('http', '→ Published: ' + JSON.stringify(result), 'sent');
  } catch (e) { addLog('http', `Error: ${e.message}`, 'err'); }
}

// ─── Logging ──────────────────────────────────────────────
function addLog(source, text, cls) {
  const log = document.getElementById('log');
  const d = document.createElement('div');
  d.className = 'entry ' + (cls || '');
  d.dataset.source = source;
  const time = new Date().toLocaleTimeString();
  d.textContent = `[${time}] [${source.toUpperCase()}] ${text}`;
  if (activeTab !== 'all' && source !== activeTab) d.style.display = 'none';
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase() === tab));
  document.querySelectorAll('.entry').forEach(e => {
    e.style.display = (tab === 'all' || e.dataset.source === tab) ? '' : 'none';
  });
}

function clearLog() { document.getElementById('log').innerHTML = ''; }

// ─── Browser Notifications ────────────────────────────────
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

function showNotification(rawData) {
  if (!document.hidden) return; // only show when tab is not focused
  if (Notification.permission !== 'granted') return;
  try {
    const msg = JSON.parse(rawData);
    const publisher = msg.user_id || 'SyncHub';
    const type = msg.type || 'message';
    let body = '';
    if (msg.payload) {
      body = typeof msg.payload === 'string' ? msg.payload : (msg.payload.text || msg.payload.message || JSON.stringify(msg.payload));
    }
    new Notification(`${publisher} — ${type}`, {
      body: body,
      icon: '⚡',
      tag: msg.id || Date.now().toString()
    });
  } catch { /* not JSON, ignore */ }
}
</script>
</body>
</html>
